<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iron Raven Records - World Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#05060a; color:#e0e0e0;
    font-family:'Courier New', monospace; overflow:hidden;
  }
  #header {
    position:fixed; top:0; left:0; width:100%; z-index:1000;
    padding:10px 20px; background:rgba(5,6,10,0.85);
    border-bottom:1px solid #c1121f; backdrop-filter:blur(6px);
    display:flex; align-items:center; gap:15px;
  }
  #logo {
    height:52px; width:52px; border-radius:50%;
    border:2px solid #c1121f;
    box-shadow:0 0 14px #c1121f, 0 0 28px rgba(193,18,31,0.5);
    object-fit:cover;
  }
  #header h1 {
    font-size:18px; letter-spacing:3px; color:#fff;
    text-transform:uppercase;
  }
  #header h1 span { color:#c1121f; text-shadow:0 0 10px #c1121f; }
  #subtitle { font-size:11px; color:#888; letter-spacing:2px; }
  #map { width:100vw; height:100vh; background:#05060a; }
  #panel {
    position:fixed; top:0; right:-380px; width:360px; height:100%;
    background:rgba(8,10,16,0.96); border-left:2px solid #c1121f;
    z-index:1001; transition:right .35s ease; padding:80px 20px 20px;
    box-shadow:-5px 0 30px rgba(193,18,31,0.3); overflow-y:auto;
  }
  #panel.open { right:0; }
  #panel h2 {
    color:#c1121f; font-size:22px; letter-spacing:2px;
    text-transform:uppercase; margin-bottom:5px;
    text-shadow:0 0 12px #c1121f;
  }
  #panel .count { font-size:11px; color:#777; margin-bottom:20px; letter-spacing:1px; }
  .band {
    display:block; padding:12px 15px; margin-bottom:10px;
    background:rgba(193,18,31,0.07); border:1px solid #2a2a2a;
    border-left:3px solid #c1121f; color:#ddd; text-decoration:none;
    transition:all .2s; font-size:14px; letter-spacing:1px;
  }
  .band:hover {
    background:rgba(193,18,31,0.25); border-left-width:6px;
    color:#fff; transform:translateX(-4px);
    box-shadow:0 0 15px rgba(193,18,31,0.4);
  }
  .band small { display:block; color:#888; font-size:10px; margin-top:3px; }
  #closeBtn {
    position:absolute; top:75px; right:18px; cursor:pointer;
    color:#c1121f; font-size:24px; background:none; border:none;
  }
  #hint {
    position:fixed; bottom:15px; left:50%; transform:translateX(-50%);
    z-index:1000; font-size:11px; color:#666; letter-spacing:2px;
    background:rgba(5,6,10,0.8); padding:8px 18px; border:1px solid #222;
    text-align:center;
  }
  .leaflet-top.leaflet-left { top:90px; }
  .leaflet-container { background:#05060a; }
  .leaflet-control-attribution { background:rgba(5,6,10,0.7)!important; color:#444!important; }
  .leaflet-control-attribution a { color:#666!important; }
</style>
</head>
<body>
<div id="header">
  <img id="logo" src="https://f4.bcbits.com/img/0044486851_10.jpg" alt="Iron Raven Records">
  <div>
    <h1>IRON <span>RAVEN</span> RECORDS</h1>
    <div id="subtitle">// GLOBAL METAL NETWORK</div>
  </div>
</div>
<div id="map"></div>
<div id="panel">
  <button id="closeBtn">&times;</button>
  <h2 id="countryName"></h2>
  <div class="count" id="bandCount"></div>
  <div id="bandList"></div>
</div>
<div id="hint">CLICK A GLOWING COUNTRY TO EXPLORE ITS BANDS</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const data = {
  "Germany":   { coords:[51.16,10.45], bands:[
    {name:"Tiefe Wuste", url:"https://ironravenrecords.bandcamp.com/album/gift-im-blut"},
    {name:"Henzk", url:"https://ironravenrecords.bandcamp.com/album/kein-ausgang"},
    {name:"Zaubererfluss", url:"https://ironravenrecords.bandcamp.com/album/was-vorher-fremd-war"},
    {name:"Verborgene Seele", url:"https://ironravenrecords.bandcamp.com/album/kalte-offenbarung"},
    {name:"Volten", url:"https://ironravenrecords.bandcamp.com/album/der-letzte-gott"},
    {name:"Enke marie", url:"https://ironravenrecords.bandcamp.com/album/hinter-der-wirklichkeit"},
    {name:"Phantomverbrecher", url:"https://ironravenrecords.bandcamp.com/album/die-umkehrung"},
    {name:"Anden Ferk", url:"https://ironravenrecords.bandcamp.com/album/verlust-der-kontrolle"}
  ]},
  "Croatia":   { coords:[45.1,15.2], bands:[
    {name:"Varkorgnand", url:"https://ironravenrecords.bandcamp.com/album/lice-bez-izvora"}
  ]},
  "Sweden":    { coords:[60.13,18.64], bands:[
    {name:"Raintrank", url:"https://ironravenrecords.bandcamp.com/album/den-inre-lagen"},
    {name:"PolydeadSystemets", url:"https://ironravenrecords.bandcamp.com/album/tystnadens-dom"}
  ]},
  "Portugal":  { coords:[39.4,-8.2], bands:[
    {name:"Venectium sem alma", url:"https://ironravenrecords.bandcamp.com/album/sem-retorno"}
  ]},
  "Netherlands":{ coords:[52.13,5.29], bands:[
    {name:"Mechanische Ziel", url:"https://ironravenrecords.bandcamp.com/album/de-illusie-van-zelf"},
    {name:"Geestmachine", url:"https://ironravenrecords.bandcamp.com/album/de-machine-van-angst"},
    {name:"LETZTER ENGEL", url:"https://ironravenrecords.bandcamp.com/album/nachtelijke-oproep"}
  ]},
  "Japan":     { coords:[36.2,138.25], bands:[
    {name:"Temple of Corpse", url:"https://ironravenrecords.bandcamp.com/album/naibu-hanky"}
  ]},
  "France":    { coords:[46.6,2.2], bands:[
    {name:"Seuil Inverse", url:"https://ironravenrecords.bandcamp.com/album/r-ves-qui-observent"}
  ]},
  "Finland":   { coords:[61.92,25.74], bands:[
    {name:"Sielua Ilman Lahdetta", url:"https://ironravenrecords.bandcamp.com/album/suljettu-piiri"},
    {name:"Keha Pimeyden", url:"https://ironravenrecords.bandcamp.com/album/muinainen-sopimus"}
  ]},
  "Norway":    { coords:[60.47,8.46], bands:[
    {name:"Mosunedorg", url:"https://ironravenrecords.bandcamp.com/album/de-falnes-sti"},
    {name:"Veriant", url:"https://ironravenrecords.bandcamp.com/album/babels-fall"},
    {name:"Ulvikvind", url:"https://ironravenrecords.bandcamp.com/album/den-siste-klokken"},
    {name:"Gammelt blod", url:"https://ironravenrecords.bandcamp.com/album/den-lange-stillheten"}
  ]},
  "Thailand":  { coords:[15.87,100.99], bands:[
    {name:"Black House", url:"https://ironravenrecords.bandcamp.com/album/-"}
  ]},
  "England":   { coords:[52.35,-1.17], bands:[
    {name:"EVIEUNX", url:"https://ironravenrecords.bandcamp.com/album/black-ledger"}
  ]}
};
const map = L.map('map', {
  center:[30,15], zoom:3, minZoom:2, maxZoom:6,
  worldCopyJump:true, zoomControl:true
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'Iron Raven Records | &copy; OpenStreetMap &copy; CARTO',
  subdomains:'abcd', maxZoom:19
}).addTo(map);
const glowIcon = L.divIcon({
  className:'',
  html:'<div style="width:16px;height:16px;border-radius:50%;background:#c1121f;box-shadow:0 0 12px #c1121f,0 0 24px #c1121f;animation:pulse 1.6s infinite;border:2px solid #fff;"></div><style>@keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.6}100%{transform:scale(1);opacity:1}}</style>',
  iconSize:[16,16], iconAnchor:[8,8]
});
const panel=document.getElementById('panel');
const countryName=document.getElementById('countryName');
const bandCount=document.getElementById('bandCount');
const bandList=document.getElementById('bandList');
function openPanel(country){
  const d=data[country];
  countryName.textContent=country;
  bandCount.textContent=d.bands.length+" BAND"+(d.bands.length>1?"S":"")+" // SIGNED";
  bandList.innerHTML='';
  d.bands.forEach(b=>{
    const a=document.createElement('a');
    a.className='band'; a.href=b.url; a.target='_blank'; a.rel='noopener';
    a.innerHTML=b.name+'<small>OPEN ON BANDCAMP</small>';
    bandList.appendChild(a);
  });
  panel.classList.add('open');
}
document.getElementById('closeBtn').onclick=()=>panel.classList.remove('open');
for(const country in data){
  const d=data[country];
  const m=L.marker(d.coords,{icon:glowIcon}).addTo(map);
  m.bindTooltip(country.toUpperCase()+" - "+d.bands.length+(d.bands.length>1?" bands":" band"),{
    direction:'top', offset:[0,-10]
  });
  m.on('click',()=>{ openPanel(country); map.flyTo(d.coords,4,{duration:1}); });
}
</script>
</body>
</html>
